
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; }
.phase-header {
  display: flex; align-items: center; gap: 10px;
  margin: 1.5rem 0 0.75rem;
}
.phase-badge {
  font-size: 11px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; white-space: nowrap;
}
.phase-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.days-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px; margin-bottom: 0.5rem;
}
.day-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 0.75rem 1rem; cursor: pointer;
  transition: border-color 0.15s;
}
.day-card:hover { border-color: var(--color-border-secondary); }
.day-card.active { border: 1.5px solid #7F77DD; }
.day-num { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
.day-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
.day-tag {
  display: inline-block; font-size: 10px; padding: 2px 7px;
  border-radius: 10px; margin-top: 6px;
}
.detail-panel {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  padding: 1.25rem 1.5rem; margin-top: 0.75rem;
}
.detail-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.75rem; }
.detail-section { margin-bottom: 0.75rem; }
.detail-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.detail-list { list-style: none; padding: 0; }
.detail-list li { font-size: 13px; color: var(--color-text-secondary); padding: 3px 0; padding-left: 14px; position: relative; line-height: 1.5; }
.detail-list li::before { content: "→"; position: absolute; left: 0; color: #7F77DD; font-size: 11px; top: 4px; }
.client-box {
  background: var(--color-background-primary);
  border-left: 3px solid #1D9E75;
  border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
  padding: 8px 12px; font-size: 13px; color: var(--color-text-secondary);
  font-style: italic; margin-top: 8px;
}
.ask-btn {
  margin-top: 1rem; font-size: 13px; padding: 7px 16px;
  border-radius: var(--border-radius-md); cursor: pointer;
  background: transparent; border: 0.5px solid var(--color-border-secondary);
  color: var(--color-text-primary);
}
.ask-btn:hover { background: var(--color-background-secondary); }
.prog-bar-wrap { display: flex; gap: 3px; margin-bottom: 1.5rem; }
.prog-seg { height: 4px; border-radius: 2px; flex: 1; }
</style>

<div class="wrap">

<div class="prog-bar-wrap" id="progbar"></div>

<div id="phases-container"></div>
<div id="detail-panel" style="display:none"></div>
</div>

<script>

        prompt: "Aide-moi à construire un système complet de gestion des leads sur Make.com étape par étape"
      }
    ]
  },
  {

    color: "#E1F5EE", textColor: "#0F6E56", borderColor: "#5DCAA5",

        prompt: "Explique-moi les Datastores et l'itération dans Make.com avec un exemple de scoring de leads"
      },

        client: "Pour des clients avec des automatisations complexes — maintenance facile = clients fidèles",

      },

        exercice: "Rédiger une proposition pour le projet de factures automatiques (J8–9) avec tarif",
        client: "Savoir se vendre : 500–2000€ one-shot + 100–500€/mois maintenance",
        prompt: "Comment tarifer et vendre une mission d'automatisation Make.com à un client PME ?"
      },
      { d: "J26", title: "Livrer & documenter un projet", tag: "Business",
        objectifs: ["Créer une documentation claire pour le client", "Faire une vidéo Loom de présentation", "Checklist de livraison professionnelle"],

      { d: "J28", title: "Projet capstone : Audit complet", tag: "Projet",

      { d: "J29–30", title: "Construire ton offre freelance", tag: "Lancement",

        client: "À la fin du jour 30, tu as un profil, des offres, des projets livrables — tu peux prospecter",
        prompt: "Aide-moi à créer mon offre freelance Make.com avec 3 packages tarifés pour me lancer"
      }
    ]
  }
];

const progbar = document.getElementById('progbar');
const phasesContainer = document.getElementById('phases-container');
const detailPanel = document.getElementById('detail-panel');

let selectedDay = null;

phases.forEach((phase, pi) => {
  phase.days_data.forEach(() => {
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    seg.style.background = phase.borderColor;
    progbar.appendChild(seg);
  });

  const phDiv = document.createElement('div');

  const header = document.createElement('div');
  header.className = 'phase-header';
  const badge = document.createElement('span');
  badge.className = 'phase-badge';
  badge.style.background = phase.color;
  badge.style.color = phase.textColor;
  badge.style.border = `0.5px solid ${phase.borderColor}`;
  badge.textContent = phase.days;
  const title = document.createElement('span');
  title.className = 'phase-title';
  title.textContent = phase.name;
  header.appendChild(badge);
  header.appendChild(title);
  phDiv.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'days-grid';

  phase.days_data.forEach((day, di) => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.dataset.phase = pi;
    card.dataset.day = di;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day.d;

    const t = document.createElement('div');
    t.className = 'day-title';
    t.textContent = day.title;

    const tag = document.createElement('span');
    tag.className = 'day-tag';
    tag.style.background = phase.tagBg;
    tag.style.color = phase.tagText;
    tag.textContent = day.tag;

    card.appendChild(num);
    card.appendChild(t);
    card.appendChild(tag);
    grid.appendChild(card);

    card.addEventListener('click', () => {
      document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      showDetail(phase, day);
    });
  });

  phDiv.appendChild(grid);
  phasesContainer.appendChild(phDiv);
});

function showDetail(phase, day) {
  detailPanel.style.display = 'block';
  detailPanel.innerHTML = `
    <div class="detail-title">${day.d} — ${day.title}</div>
    <div class="detail-section">
      <div class="detail-label">Objectifs du jour</div>
      <ul class="detail-list">${day.objectifs.map(o => `<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <div class="detail-label">Exercice pratique</div>
      <ul class="detail-list"><li>${day.exercice}</li></ul>
    </div>
    <div class="detail-section">
      <div class="detail-label">Contexte client réel</div>
      <div class="client-box">${day.client}</div>
    </div>
    <button class="ask-btn" onclick="sendPrompt('${day.prompt.replace(/'/g, "\\'")}')">Démarrer ce jour ↗</button>
  `;
  detailPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
